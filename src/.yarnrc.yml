# Yarn 配置文件
# 启用严格模式
enableStrictSsl: true

# 设置镜像源
npmRegistryServer: "https://registry.npmmirror.com"

# 启用PnP模式 (可选,更严格的依赖管理)
# nodeLinker: pnp

# 启用自动安装插件
enableGlobalCache: true

# 缓存目录
cacheFolder: ".yarn/cache"

# 安装模式
nodeModulesHoistPattern: [
  "*"
]

# 忽略平台
ignorePlatform: false

# 忽略engines
ignoreEngines: false
